name: Python Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_call:

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-* freeglut3-dev libglib2.0 libpulse0 pipewire libva-drm2 libva-dev libva-x11-2 mesa-va-drivers va-driver-all ffmpeg
        pulseaudio -D --exit-idle-time=-1
        pactl load-module module-dummy-main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/setup.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[tests]

    - name: Setup Virtual Audio and Display
      run: |
        # Initialize a dummy sound card for PipeWire/PulseAudio
        mkdir -p ~/.config/pipewire
        cp /usr/share/pipewire/client.conf ~/.config/pipewire/ || true
        
        # Start xvfb with a dedicated display number
        Xvfb :99 -screen 0 1024x768x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV
      

    - name: Run tests
      env:
        DISPLAY: :99
        # Force Qt to use the software FFmpeg path instead of hardware VA-API
        QT_VIDEO_BACKEND: ffmpeg
        # Suppress the VA-API symbol lookup logs
        LIBVA_MESSAGING_LEVEL: 0 
      run: |
        # Use 'dbus-run-session' to give the media player a bus to talk to
        dbus-run-session -- python -m pytest