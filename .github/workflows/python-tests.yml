name: Python Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_call:

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb libxkbcommon-x11-0 libxcb-cursor0 \
          libglib2.0-0 libpulse0 pipewire pipewire-pulse \
          libva-drm2 libva-dev libva-x11-2 mesa-va-drivers \
          ffmpeg pipewire-audio-client-libraries dbus-x11 \
          libegl1 libgles2 libgl1-mesa-dev

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[tests]

    - name: Setup Virtual Audio and Display
    # We move the startup logic here to ensure the daemons stay alive for the next step
      run: |
        # 1. Setup PipeWire config
        mkdir -p ~/.config/pipewire
        cp /usr/share/pipewire/client.conf ~/.config/pipewire/ || true
        
        # 2. Start PipeWire and PulseAudio compatibility layer
        /usr/bin/pipewire &
        sleep 2
        /usr/bin/pipewire-pulse &
        sleep 2
        
        # 3. Start Xvfb
        Xvfb :99 -screen 0 1024x768x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Run tests
      env:
        DISPLAY: :99
        QT_VIDEO_BACKEND: ffmpeg
        QT_MULTIMEDIA_PREFERRED_PLUGINS: ffmpeg
        LIBVA_MESSAGING_LEVEL: 0 
      run: |
        # dbus-run-session is the "glue" that lets PipeWire and Qt talk 
        # to each other in a headless environment.
        dbus-run-session -- python -m pytest